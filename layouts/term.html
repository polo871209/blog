{{ define "main" }}
<section class="list">
  <h2 class="term-head">#{{ .Title }}</h2>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <a href="{{ .RelPermalink }}">
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
          <span class="post-title">{{ .Title }}</span>
        </a>
      </li>
    {{ end }}
  </ul>
</section>
{{ end }}
